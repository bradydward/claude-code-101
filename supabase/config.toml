# Supabase project configuration for Claude Code 101
# Phase 6: Global Learning Intelligence

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322

[studio]
enabled = true
port = 54323

[functions]
verify_jwt = true

[auth]
# Enable anonymous sign-ins (research Pattern 2)
enable_anonymous_sign_ins = true
# Rate limit for anonymous auth (research Pitfall 5)
# Default is 30/hour, we use 10/hour for security
rate_limit_anonymous_users = 10
